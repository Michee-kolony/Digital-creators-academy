<div class="admin-container">
  <!-- Sidebar -->
  <aside class="sidebar" [class.sidebar-collapsed]="isSidebarCollapsed">
    <div class="sidebar-header">
      <div class="logo-container">
        <img *ngIf="!isSidebarCollapsed" src="images/logo.png"  alt="Logo" class="logo">
        <img *ngIf="isSidebarCollapsed" src="images/logo.png" alt="Logo" class="logo">
        <span *ngIf="!isSidebarCollapsed" class="logo-text">AdminPanel</span>
      </div>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <i class="fas" [class.fa-chevron-left]="!isSidebarCollapsed" [class.fa-chevron-right]="isSidebarCollapsed"></i>
      </button>
    </div>

    <nav class="sidebar-nav">
      <ul class="nav-list">
        <li class="nav-item">
          <a class="nav-link" routerLink="/admin/dashboard" routerLinkActive="active">
            <i class="fas fa-tachometer-alt"></i>
            <span *ngIf="!isSidebarCollapsed">Dashboard</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/admin/preinscription" routerLinkActive="active">
            <i class="fas fa-users"></i>
            <span *ngIf="!isSidebarCollapsed">Pré-inscription</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/admin/products" routerLinkActive="active">
            <i class="fas fa-box"></i>
            <span *ngIf="!isSidebarCollapsed">Produits</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/admin/orders" routerLinkActive="active">
            <i class="fas fa-shopping-cart"></i>
            <span *ngIf="!isSidebarCollapsed">Commandes</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/admin/categories" routerLinkActive="active">
            <i class="fas fa-tags"></i>
            <span *ngIf="!isSidebarCollapsed">Catégories</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/admin/settings" routerLinkActive="active">
            <i class="fas fa-cog"></i>
            <span *ngIf="!isSidebarCollapsed">Paramètres</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/admin/reports" routerLinkActive="active">
            <i class="fas fa-chart-bar"></i>
            <span *ngIf="!isSidebarCollapsed">Rapports</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <div *ngIf="!isSidebarCollapsed" class="user-details">
          <span class="user-name">Admin User</span>
          <span class="user-role">Administrateur</span>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()">
        <i class="fas fa-sign-out-alt"></i>
        <span *ngIf="!isSidebarCollapsed">Déconnexion</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content" [class.content-expanded]="isSidebarCollapsed">
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
