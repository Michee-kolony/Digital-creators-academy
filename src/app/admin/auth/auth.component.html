<div class="min-h-screen bg-gradient-to-br from-[#1B4289]  to-[#0C1836]">
  <div class="container mx-auto px-4 py-8 lg:py-12">
    <div class="flex flex-col lg:flex-row rounded-3xl overflow-hidden shadow-2xl bg-white">
      
      <!-- Colonne gauche - Formulaire -->
      <div class="w-full lg:w-2/5 p-8 lg:p-12">
        <div class="max-w-md mx-auto">

          <!-- Logo et titre -->
          <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-r from-[#1B4289] to-[#1B4289] rounded-2xl mb-4">
              <img src="images/logo.png" />
            </div>
            <h2 class="text-3xl font-bold text-gray-800 mb-2">Administration</h2>
            <p class="text-gray-500">Connectez-vous à votre espace admin</p>
          </div>

          <!-- Formulaire -->
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">

            <!-- Email -->
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Email professionnel</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207">
                    </path>
                  </svg>
                </div>

                <input type="email" formControlName="email"
                  class="w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none"
                  placeholder="admin@digitalcreators.com">
              </div>

              <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
                class="mt-1 text-sm text-red-500">
                <span *ngIf="loginForm.get('email')?.errors?.['required']">L'email est requis</span>
                <span *ngIf="loginForm.get('email')?.errors?.['email']">Email invalide</span>
              </div>
            </div>

            <!-- Mot de passe -->
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Mot de passe</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                    </path>
                  </svg>
                </div>

                <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
                  class="w-full pl-10 pr-12 py-3 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none"
                  placeholder="Votre mot de passe">

                <button type="button" (click)="togglePassword()"
                  class="absolute inset-y-0 right-0 pr-3 flex items-center">
                  
                  <!-- Eye -->
                  <svg *ngIf="!showPassword" class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                    </path>
                  </svg>

                  <!-- Eye off -->
                  <svg *ngIf="showPassword" class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242">
                    </path>
                  </svg>
                </button>

              </div>

              <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
                class="mt-1 text-sm text-red-500">
                <span *ngIf="loginForm.get('password')?.errors?.['required']">Le mot de passe est requis</span>
                <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Minimum 6 caractères</span>
              </div>
            </div>

            <!-- Remember -->
            <div class="flex items-center justify-between">
              <label class="flex items-center">
                <input type="checkbox" formControlName="rememberMe"
                  class="w-4 h-4 text-indigo-600 border-gray-300 rounded">
                <span class="ml-2 text-sm text-gray-600">Se souvenir de moi</span>
              </label>
            </div>

            <!-- Bouton -->
            <button type="submit" [disabled]="isLoading"
              class="w-full bg-gradient-to-r from-[#1B4289] to-[#1B4289] text-white py-3 rounded-xl font-semibold disabled:opacity-50">

              <span *ngIf="!isLoading">Se connecter</span>

              <span *ngIf="isLoading" class="flex items-center justify-center">
                <svg class="animate-spin h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                </svg>
                Connexion...
              </span>

            </button>

          </form>

          <p class="text-center text-sm text-gray-500 mt-6">
            Espace réservé aux administrateurs
          </p>

        </div>
      </div>

      <!-- Colonne droite -->
      <div class="w-full lg:w-3/5 bg-gradient-to-br from-[#1B4289] to-[#2E498F] p-8 lg:p-12 hidden lg:flex items-center justify-center">
        <div class="text-center text-white">

          <img src="images/DSC_5648.jpg.jpeg"
               class="rounded-2xl shadow-2xl mx-auto mb-6 w-full max-w-md object-cover">

          <h3 class="text-3xl font-bold">Digital Creators Academy</h3>
          <p class="text-xl text-indigo-100">Formez les créateurs de demain</p>

        </div>
      </div>

    </div>
  </div>

  <!-- Toasts -->
  <div class="fixed bottom-4 right-4 space-y-2 z-50">
    <div *ngFor="let toast of toasts" 
         [class]="'transform transition-all ' + toast.type"
         @fadeInOut>

      <div class="flex items-center p-4 bg-white rounded-lg shadow-lg">
        <p class="text-sm">{{ toast.message }}</p>

        <button (click)="removeToast(toast.id)" class="ml-4">
          ✕
        </button>
      </div>

    </div>
  </div>
</div>
