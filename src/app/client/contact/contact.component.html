<section class="relative py-32 overflow-hidden">
  
  <!-- BACKGROUND -->
  <div class="absolute inset-0 z-0">
    <img src="images/DSC_5882.jpg.jpeg" 
         class="w-full h-full object-cover">
    <div class="absolute inset-0 bg-black/50"></div>
  </div>

  <div class="absolute inset-0 z-1 bg-[#1B4289]/50"></div>

  <!-- CONTAINER LARGE -->
  <div class="container mx-auto px-4 relative z-10">
    
    <!-- LARGE WIDTH -->
    <div class="max-w-6xl mx-auto">

      <!-- TITLE -->
      <div class="text-center mb-10">
        <h2 class="text-3xl md:text-4xl lg:text-5xl font-bold text-white mb-4">
           Contactez-nous
        </h2>
        <div class="w-24 h-1 bg-[#AB9364] mx-auto rounded-full"></div>
        <p class="text-gray-200 mt-4">
         Ce formulaire est conçu pour une collaboration dynamique entre vous et nous.
        </p>
      </div>

      <!-- FORM -->
      <form class="bg-white/10 backdrop-blur-md rounded-2xl p-6 md:p-10 shadow-2xl border border-white/20">
        
        <!-- GRID 2 COLONNES -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

          <!-- NOM -->
          <div>
            <label class="block text-white text-sm font-semibold mb-2">
              Nom complet <span class="text-[#AB9364]">*</span>
            </label>
            <input type="text"
              class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:border-[#AB9364] focus:ring-2 focus:ring-[#AB9364]/50 outline-none"
              placeholder="Jean Dupont">
          </div>

          <!-- EMAIL -->
          <div>
            <label class="block text-white text-sm font-semibold mb-2">
              Email <span class="text-[#AB9364]">*</span>
            </label>
            <input type="email"
              class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:border-[#AB9364] focus:ring-2 focus:ring-[#AB9364]/50 outline-none"
              placeholder="email@gmail.com">
          </div>

          <!-- TELEPHONE -->
          <div>
            <label class="block text-white text-sm font-semibold mb-2">
              Téléphone <span class="text-[#AB9364]">*</span>
            </label>
            <input type="tel"
              class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:border-[#AB9364] focus:ring-2 focus:ring-[#AB9364]/50 outline-none"
              placeholder="+243 ...">
          </div>

          <!-- FORMATION -->
          <div>
            <label class="block text-white text-sm font-semibold mb-2">
              Type de contact <span class="text-[#AB9364]">*</span>
            </label>
            <select
              class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white focus:border-[#AB9364] focus:ring-2 focus:ring-[#AB9364]/50 outline-none">
              
              <option class="text-black">Quel est votre objet ?</option>
              <option class="text-black">Contact uniquement</option>
              <option class="text-black">Question préoccupante</option>
              <option class="text-black">Demande de partenariat</option>
              <option class="text-black">autres</option>

            </select>
          </div>

        </div>

        <!-- MESSAGE FULL WIDTH -->
        <div class="mt-6">
          <label class="block text-white text-sm font-semibold mb-2">
            Message
          </label>
          <textarea rows="4"
            class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:border-[#AB9364] focus:ring-2 focus:ring-[#AB9364]/50 outline-none"
            placeholder="Explique ton projet..."></textarea>
        </div>

        <!-- BUTTON -->
        <div class="mt-8">
          <button type="submit"
            class="w-full bg-[#AB9364] hover:bg-[#8B7344] text-white font-bold py-3 rounded-lg transition transform hover:scale-105">
            
            Envoyer
          </button>
        </div>

      </form>

    </div>
  </div>
</section>
