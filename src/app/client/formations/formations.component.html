<section class="relative h-[300px] md:h-[350px] flex items-center justify-center text-center text-white">

  <!-- 🖼️ IMAGE BACKGROUND -->
  <div class="absolute inset-0">
    <img 
      src="images/468566758_122113510322590644_7226512650798794471_n.jpg" 
      alt="Hero"
      class="w-full h-full object-cover"
    />
    <!-- overlay sombre -->
    <div class="absolute inset-0 bg-[#1B4289]/60"></div>
  </div>

  <!-- 📝 TEXTE -->
  <div class="relative z-10">
    <h1 class="text-3xl md:text-5xl font-bold">
      Nos formations
    </h1>
  </div>

</section>

<div class="p-6 md:p-10">

  <!-- 🔍 SEARCH -->
  <div class="max-w-md mx-auto mb-10">
   <div class="relative">
      <i class="fa-solid fa-search absolute right-5 top-5 opacity-50"></i>
       <input
      type="text"
      [(ngModel)]="searchTerm"
      placeholder="Rechercher une formation..."
      class="w-full px-5 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
   </div>
  </div>

  <!-- 🧱 GRID 2 COLONNES -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 container">

    <!-- 🎓 COLONNE FORMATIONS -->
    <div class="lg:col-span-2 space-y-6">

      <div *ngFor="let formation of filteredFormations"
           class="flex gap-4 bg-white rounded-xl shadow-md hover:shadow-lg transition p-3 items-center border">

        <!-- IMAGE -->
        <img
          [src]="formation.image"
          class="w-28 h-28 md:w-40 md:h-32 object-cover rounded-lg flex-shrink-0"
        />

        <!-- CONTENU -->
        <div class="flex flex-col justify-between w-full">

          <h2 class="text-lg md:text-xl font-bold mb-2">
            {{ formation.title }}
          </h2>

          <div class="text-sm text-gray-500 space-y-1">
            <p>Début : {{ formation.startDate }}</p>
            <p>Durée : {{ formation.duration }}</p>
          </div>

          <div class="flex justify-between items-center mt-3">

            <span class="text-[#1B4289] font-bold  text-lg">
              {{ formation.price }} $
            </span>

            <button class="bg-[#1B4289] text-white px-4 py-1.5 rounded-md text-sm transition">
              S'inscrire
            </button>

          </div>

        </div>

      </div>

      <!-- EMPTY -->
      <div *ngIf="filteredFormations.length === 0"
           class="text-center text-gray-500 mt-10">
        Aucune formation trouvée
      </div>

    </div>

   <!-- 🟩 COLONNE DROITE -->
<div class="hidden lg:block">
  
  <div class="relative rounded-xl overflow-hidden h-full min-h-[400px]">

    <!-- 🖼️ IMAGE BACKGROUND -->
    <img 
      src="images/DSC_5555.jpg.jpeg"
      class="w-full h-full object-cover absolute inset-0"
    />

    <!--OVERLAY BLEU -->
    <div class="absolute inset-0 bg-blue-700/70"></div>

    <!-- TEXTE -->
    <div class="relative z-10 flex items-center justify-center h-full text-center px-6">
      <h2 class="text-white text-2xl font-bold leading-snug">
        C’est vous le futur
      </h2>
    </div>

  </div>

</div>

  </div>

</div>
